# CI: validate SCALEAPP and APP on every push and pull request
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-scaleapp:
    name: Validate SCALEAPP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r SCALEAPP/requirements.txt

      - name: Verify app loads
        run: |
          cd SCALEAPP && python -c "from app import app; print('SCALEAPP OK')"

  validate-app:
    name: Validate APP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r APP/requirements.txt

      - name: Verify app loads
        run: |
          cd APP && python -c "from app import app; print('APP OK')"
